<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Navy background with rounded corners (iOS icon style) -->
  <rect width="512" height="512" rx="108" fill="#1C1C5C"/>

  <!-- "sodexo" wordmark centered — white text on navy
       The logo viewBox is 480x140. We scale it to fit width ~460px, height ~135px
       centered in the 512x512 square, shifted down slightly.
       Scale factor: 460/480 = 0.9583  → text height 100*0.9583 ≈ 96px
       We position with transform to center it vertically.
       y center = 256, half text height ~48 → top = 208 → transform y shift needed.

       Using a nested <svg> to embed the logo with its own viewBox:
  -->
  <svg x="26" y="155" width="460" height="134" viewBox="0 0 480 140">
    <!-- "sodexo" in white -->
    <text x="20" y="108"
      font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="100" font-weight="700"
      fill="#FFFFFF" letter-spacing="-1">sodexo</text>

    <!-- Red swoosh -->
    <path d="M 255 116 Q 290 80, 330 40 Q 348 20, 362 10 Q 368 6, 370 8 Q 372 12, 360 28 Q 342 52, 316 78 Q 290 100, 264 112 Z"
      fill="#EE0000"/>

    <!-- White star -->
    <polygon points="370,8 373,-4 376,8 388,5 378,14 388,22 376,18 373,30 370,18 358,22 368,14 358,5"
      fill="#FFFFFF"/>
  </svg>

  <!-- Rounded corner clip so nothing bleeds outside -->
  <rect width="512" height="512" rx="108" fill="none" stroke="none"/>

</svg>
