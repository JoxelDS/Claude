<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1C1C5C"/>
      <stop offset="100%" stop-color="#080820"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#FF3333"/>
    </linearGradient>
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- 
    S letterform — pure rectangles + circles, NO arc commands
    Canvas 512x512. S occupies left portion, leaves right margin.
    
    S anatomy (no arcs):
    - Top bar: horizontal rect going right, tall enough to read
    - Right drop: vertical rect on right side going down
    - Bridge: diagonal parallelogram across center
    - Left drop: vertical rect on left side going down  
    - Bottom bar: horizontal rect going right
    
    The trick: the "openings" of the S (where the counter-forms are)
    are just the GAPS between the components — no cutouts needed.
  -->

  <!-- S letterform in white -->
  <!-- Top horizontal bar -->
  <rect x="78" y="82" width="230" height="72" rx="36" fill="white"/>
  <!-- Right vertical bar (right side of top C) -->
  <rect x="238" y="82" width="72" height="206" rx="36" fill="white"/>
  <!-- Bridge: diagonal parallelogram from top-right to bottom-left -->
  <polygon points="310,212  78,294  78,360  310,278" fill="white"/>
  <!-- Left vertical bar (left side of bottom C) -->
  <rect x="78" y="240" width="72" height="196" rx="36" fill="white"/>
  <!-- Bottom horizontal bar -->
  <rect x="78" y="364" width="230" height="72" rx="36" fill="white"/>

  <!-- 
    Red diagonal slash — the Sodexo brand signature
    Goes from bottom-left to top-right, crossing the S
    Positioned roughly center of the S shape
    Angle: about 55 degrees from horizontal
    
    The slash is a thin red parallelogram:
    Bottom point: (100, 430)
    Top point: (300, 130)
    Width: ~28px perpendicular to the stroke
  -->
  <!-- Red slash stroke (parallelogram) -->
  <polygon points="85,420  115,440  315,140  285,120" fill="url(#red)"/>

  <!-- 4-pointed star at top of slash (Sodexo brand star) -->
  <path d="M 300,108 L 309,132 L 333,141 L 309,150 L 300,174 L 291,150 L 267,141 L 291,132 Z"
    fill="#FF2222" filter="url(#starGlow)"/>

</svg>
