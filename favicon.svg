<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: deep navy rounded square -->
  <rect width="64" height="64" rx="13" fill="#1B1E8A"/>

  <!-- Bold "S" drawn as a pure path — no font dependency.
       Constructed from two arcs (top bowl and bottom bowl) connected
       by a diagonal bridge, matching a heavy sans-serif S at ~38pt. -->
  <path d="
    M 38 10
    C 45 10, 50 15, 50 20
    C 50 25, 46 28, 40 30
    L 34 32
    C 26 34, 20 37, 20 44
    C 20 50, 25 55, 33 55
    C 38 55, 44 53, 48 49
    L 44 45
    C 41 48, 37 50, 33 50
    C 28 50, 25 48, 25 44
    C 25 41, 28 39, 35 37
    L 40 35
    C 49 32, 55 27, 55 20
    C 55 13, 49 7, 40 7
    C 34 7, 28 10, 24 14
    L 28 18
    C 31 15, 34 10, 38 10
    Z
  " fill="#FFFFFF"/>

  <!-- Red diagonal accent bar — lower-right corner, crisp rectangle rotated ~45° -->
  <rect x="40" y="38" width="22" height="8" rx="3" fill="#EE0000" transform="rotate(-40 51 42)"/>

  <!-- Small white four-pointed star top-right -->
  <path d="M 52 8 L 53.5 13 L 58 14.5 L 53.5 16 L 52 21 L 50.5 16 L 46 14.5 L 50.5 13 Z" fill="#FFFFFF"/>
</svg>
