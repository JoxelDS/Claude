<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2A295C" />
    <!-- Cache busting: force browsers to always revalidate index.html -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="/Claude/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/Claude/favicon.svg" />
    <link rel="apple-touch-icon" href="/Claude/icons/icon-192.png" />
    <!-- DNS prefetch + preconnect for Google Fonts (fastest load) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload font CSS so it starts downloading immediately -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
    <title>Sodexo Live! Kitchen Inspection</title>
    <!-- Inline critical CSS for instant first paint -->
    <style>
      body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f7}
      #splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:linear-gradient(135deg,#2A295C 0%,#1e1d4a 50%,#283897 100%);z-index:9999;transition:opacity .3s}
      #splash.hide{opacity:0;pointer-events:none}
      .sp-logo{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:-.3px}
      .sp-bar{width:120px;height:3px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
      .sp-fill{width:40%;height:100%;background:#EE0000;border-radius:3px;animation:sp .8s ease infinite alternate}
      @keyframes sp{from{transform:translateX(0)}to{transform:translateX(200%)}}
    </style>
  <!-- Google Translate Element (free, no API key) -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'en', autoDisplay: false },
        'google_translate_element'
      );
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <style>
    /* Hide ALL Google Translate chrome — banner, tooltip, top bar, logo */
    .goog-te-banner-frame,
    .goog-te-balloon-frame,
    .goog-te-menu-frame,
    #goog-gt-tt,
    .goog-tooltip,
    .goog-tooltip-content,
    .goog-te-spinner,
    .VIpgJd-ZVi9od-aZ2wEe,
    .VIpgJd-ZVi9od-aZ2wEe-OiiCO,
    iframe.skiptranslate,
    .skiptranslate { display: none !important; visibility: hidden !important; }
    /* Prevent Google from pushing body down or repositioning it */
    body,
    body.translated-ltr,
    body.translated-rtl { top: 0 !important; margin-top: 0 !important; position: static !important; }
    /* Kill the top bar that flashes when translation is applied */
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    font[style*="vertical-align"] { vertical-align: inherit !important; }
  </style>
    <script type="module" crossorigin src="/Claude/assets/BG0kbsnl.js"></script>
    <link rel="modulepreload" crossorigin href="/Claude/assets/DCpd0Dq0.js">
    <link rel="modulepreload" crossorigin href="/Claude/assets/DJfpdLVi.js">
    <link rel="modulepreload" crossorigin href="/Claude/assets/Ca0nQ8pt.js">
    <link rel="modulepreload" crossorigin href="/Claude/assets/JwO8960p.js">
    <link rel="stylesheet" crossorigin href="/Claude/assets/DpADPkkw.css">
  </head>
  <body>
    <!-- Google Translate widget — mounted here permanently, teleported into popover via JS -->
    <div id="google_translate_element" style="position:fixed;top:-9999px;left:-9999px;"></div>
    <!-- Instant splash screen while JS loads -->
    <div id="splash">
      <div class="sp-logo">Sodexo Live!</div>
      <div class="sp-bar"><div class="sp-fill"></div></div>
    </div>
    <div id="root"></div>
    <!-- Splash watchdog: if React hasn't dismissed the splash in 6s, the JS
         bundle likely failed to load (stale SW cache). Clear all caches and reload. -->
    <script>
      (function () {
        var TIMEOUT = 6000;
        var t = setTimeout(function () {
          var splash = document.getElementById("splash");
          if (!splash || splash.classList.contains("hide")) return; // React mounted fine
          // React never mounted — nuke SW caches and reload fresh
          if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage("CLEAN_CACHE");
          }
          if ("caches" in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).then(function () { window.location.reload(true); });
          } else {
            window.location.reload(true);
          }
        }, TIMEOUT);
        // React dismissed splash — cancel watchdog
        var observer = new MutationObserver(function () {
          var splash = document.getElementById("splash");
          if (!splash || splash.classList.contains("hide")) {
            clearTimeout(t);
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ["class"] });
      })();
    </script>
  </body>
</html>
