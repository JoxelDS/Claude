name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/interview-notes-component-86atl
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Deploy method 1: Push to gh-pages branch
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      # Deploy method 2: GitHub Pages artifact API (if Pages source is set to Actions)
      - uses: actions/configure-pages@v4
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
